# NATS Configuration
port: 4222

# Jetstream
jetstream {
  store_dir: /data
  max_memory_store: 500M
  max_file_store: 10G
}

# Cluster configuration
cluster {
  name: tsplineforge
  listen: 0.0.0.0:6222

  routes: [
    nats://nats:6222
  ]
}

# HTTP monitoring
http: 8222

# Logging
debug: false
trace: false
logtime: true
log_file: /var/log/nats/nats.log

# Accounts and authorization
accounts: {
  SYS: {
    jetstream: enabled
  }
}

# System account
system_account: SYS
